name = "email-postmark-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Non-secret config. Because git-integration runs `wrangler deploy`, these
# values are the source of truth and OVERWRITE any plain-text vars edited in
# the dashboard. Keep the real values here; reuse the worker for another
# project by giving that project its own repo/worker with its own values.
#
# POSTMARK_TOKEN is a SECRET — do NOT put it here (secrets survive deploys).
# Set it once via the dashboard (Settings > Variables > Encrypt) or:
#   wrangler secret put POSTMARK_TOKEN
[vars]
FROM_EMAIL = "me@finx.dev"
TO_EMAIL = "oieusouofinx@gmail.com"
ALLOWED_ORIGINS = "https://finx.dev"
MESSAGE_STREAM = "outbound"
SUBJECT_PREFIX = "[finx.dev] "
