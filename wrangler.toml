name = "email-postmark-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Non-secret config. Override per-project in the Cloudflare dashboard
# (Settings > Variables) or here before deploy.
#
# POSTMARK_TOKEN is a SECRET — do NOT put it here. Set it with:
#   wrangler secret put POSTMARK_TOKEN
# or via the dashboard (Settings > Variables > Encrypt).
[vars]
FROM_EMAIL = "contact@example.com"
TO_EMAIL = "you@example.com"
ALLOWED_ORIGINS = "https://finx.dev"
MESSAGE_STREAM = "outbound"
SUBJECT_PREFIX = ""
